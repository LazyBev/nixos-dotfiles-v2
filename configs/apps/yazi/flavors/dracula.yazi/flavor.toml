
[mgr]
cwd = { fg = "#8be9fd" }
find_keyword  = { fg = "#f1fa8c", bold = true, italic = true, underline = true }
find_position = { fg = "#ff79c6", bg = "reset", bold = true, italic = true }
marker_copied   = { fg = "#50fa7b", bg = "#50fa7b" }
marker_cut      = { fg = "#ff5555", bg = "#ff5555" }
marker_marked   = { fg = "#8be9fd", bg = "#8be9fd" }
marker_selected = { fg = "#f1fa8c", bg = "#f1fa8c" }
count_copied   = { fg = "#282a36", bg = "#50fa7b" }
count_cut      = { fg = "#282a36", bg = "#ff5555" }
count_selected = { fg = "#282a36", bg = "#f1fa8c" }
border_symbol = "│"
border_style  = { fg = "#7282b5" }

[tabs]
active   = { fg = "#282a36", bg = "#bd93f9", bold = true }
inactive = { fg = "#bd93f9", bg = "#44475a" }

[mode]
normal_main = { fg = "#282a36", bg = "#bd93f9", bold = true }
normal_alt  = { fg = "#bd93f9", bg = "#44475a" }
select_main = { fg = "#282a36", bg = "#8be9fd", bold = true }
select_alt  = { fg = "#8be9fd", bg = "#44475a" }
unset_main = { fg = "#282a36", bg = "#ffb86c", bold = true }
unset_alt  = { fg = "#ffb86c", bg = "#44475a" }

[status]
perm_sep   = { fg = "#7282b5" }
perm_type  = { fg = "#bd93f9" }
perm_read  = { fg = "#f1fa8c" }
perm_write = { fg = "#ff5555" }
perm_exec  = { fg = "#50fa7b" }
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#50fa7b", bg = "#63667d" }
progress_error  = { fg = "#f1fa8c", bg = "#ff5555" }

[pick]
border   = { fg = "#bd93f9" }
active   = { fg = "#ff79c6", bold = true }
inactive = {}

[input]
border   = { fg = "#bd93f9" }
title    = {}
value    = {}
selected = { reversed = true }

[cmp]
border = { fg = "#bd93f9" }

[tasks]
border  = { fg = "#bd93f9" }
title   = {}
hovered = { fg = "#ff79c6", bold = true }

[which]
mask            = { bg = "#44475a" }
cand            = { fg = "#8be9fd" }
rest            = { fg = "#8998c9" }
desc            = { fg = "#ff79c6" }
separator       = "  "
separator_style = { fg = "#83869c" }

[help]
on      = { fg = "#8be9fd" }
run     = { fg = "#ff79c6" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#44475a", bg = "#f8f8f2" }

[spot]
border   = { fg = "#bd93f9" }
title    = { fg = "#bd93f9" }
tbl_col  = { fg = "#8be9fd" }
tbl_cell = { fg = "#ff79c6", bg = "#63667d" }

[notify]
title_info  = { fg = "#50fa7b" }
title_warn  = { fg = "#f1fa8c" }
title_error = { fg = "#ff5555" }

[filetype]
rules = [
  { mime = "image/*", fg = "#8be9fd" },
  { mime = "{audio,video}/*", fg = "#f1fa8c" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff79c6" },
  { mime = "application/{pdf,doc,rtf}", fg = "#50fa7b" },
  { mime = "vfs/{absent,stale}", fg = "#8998c9" },
  { url = "*", fg = "#f8f8f2" },
  { url = "*/", fg = "#bd93f9" },
]

[icon]
dirs = [
  { name = ".config", text = "", fg = "#ff79c6" },
  { name = ".git", text = "", fg = "#8be9fd" },
  { name = ".github", text = "", fg = "#bd93f9" },
  { name = ".npm", text = "", fg = "#bd93f9" },
  { name = "Desktop", text = "", fg = "#8be9fd" },
  { name = "Development", text = "", fg = "#8be9fd" },
  { name = "Documents", text = "", fg = "#8be9fd" },
  { name = "Downloads", text = "", fg = "#8be9fd" },
  { name = "Library", text = "", fg = "#8be9fd" },
  { name = "Movies", text = "", fg = "#8be9fd" },
  { name = "Music", text = "", fg = "#8be9fd" },
  { name = "Pictures", text = "", fg = "#8be9fd" },
  { name = "Public", text = "", fg = "#8be9fd" },
  { name = "Videos", text = "", fg = "#8be9fd" },
]
conds = [
  { if = "orphan", text = "", fg = "#f8f8f2" },
  { if = "link", text = "", fg = "#7282b5" },
  { if = "block", text = "", fg = "#ffb86c" },
  { if = "char", text = "", fg = "#ffb86c" },
  { if = "fifo", text = "", fg = "#ffb86c" },
  { if = "sock", text = "", fg = "#ffb86c" },
  { if = "sticky", text = "", fg = "#ffb86c" },
  { if = "dummy", text = "", fg = "#ff5555" },
  { if = "dir & hovered", text = "", fg = "#bd93f9" },
  { if = "dir", text = "", fg = "#bd93f9" },
  { if = "exec", text = "", fg = "#50fa7b" },
  { if = "!dir", text = "", fg = "#f8f8f2" },
]
