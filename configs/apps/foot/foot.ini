[main]
font=Pragmasevka Nerd Font:size=11
term=xterm-256color
dpi-aware=yes
initial-window-size-pixels=1000x600
pad=10x10

[colors-dark]
background=282a36
foreground=f8f8f2
regular0=21222c
regular1=ff5555
regular2=50fa7b
regular3=f1fa8c
regular4=bd93f9
regular5=ff79c6
regular6=8be9fd
regular7=f8f8f2
bright0=6272a4
bright1=ff6e6e
bright2=69ff94
bright3=ffffa5
bright4=d6acff
bright5=ff92df
bright6=a4ffff
bright7=ffffff

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000

[mouse]
hide-when-typing=yes

[key-bindings]
select-begin=Control+Shift+s
select-begin-block=Control+Shift+b
select-extend-character-wise=Control+Shift+e
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
scrollback-up-page=Control+u
scrollback-down-page=Control+d
search-start=Control+Shift+f

[search-bindings]
extend-to-next-whitespace=none
extend-char=Control+Shift+l
extend-backward-char=Control+Shift+h
extend-line-down=Control+Shift+j
extend-line-up=Control+Shift+k
extend-to-word-boundary=Control+Shift+w
extend-backward-to-word-boundary=Control+Shift+b
find-prev=Shift+Return
find-next=Return
cursor-left=Left
cursor-right=Right
cursor-home=Home
cursor-end=End
delete-prev=BackSpace
delete-prev-word=Control+BackSpace
abort=Escape

[vi-mode-bindings]
enter=Control+Shift+space
leave=Escape
cursor-left=h
cursor-right=l
cursor-up=k
cursor-down=j
cursor-word-left=b
cursor-word-right=w
cursor-left-margin=0
cursor-right-margin=dollar
cursor-top=g
cursor-bottom=G
half-page-up=Control+u
half-page-down=Control+d
page-up=Control+b
page-down=Control+f
start-selection=v
toggle-selection-type=Control+v
copy=y
jump-label-activate=f
