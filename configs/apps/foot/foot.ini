[main]
include=~/.config/foot/themes/dracula
term=xterm-256color
dpi-aware=yes
initial-window-size-pixels=1000x600
pad=10x10
font=Pragmasevka Nerd Font:size=11

[key-bindings]
select-begin=Control+Shift+s
select-begin-block=Control+Shift+b
select-extend-character-wise=Control+Shift+e
clipboard-copy=Control+Shift+c
